server:
  port: 7707

spring:
  application:
    name: user-service

  config:
    import: "configserver:http://localhost:7777"

  cloud:
    config:
      fail-fast: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7779/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
